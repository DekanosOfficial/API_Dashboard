<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexus API Health Observatory | Neon Green Edition</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a 0%, #05070c 100%);
            min-height: 100vh;
            padding: 24px 28px;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* header - premium gradient with green accents */
        .glass-header {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.08), rgba(0, 30, 15, 0.4));
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 150, 0.3);
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-glow h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(120deg, #a0ffc0, #40ff80, #00ff66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-glow p {
            color: #6eff9e;
            font-size: 0.85rem;
            margin-top: 6px;
            text-shadow: 0 0 5px rgba(0,255,100,0.3);
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .pill-update {
            background: rgba(0, 20, 10, 0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #5eff9e;
            font-weight: 500;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }

        .refresh-glow {
            background: linear-gradient(95deg, #00cc55, #00aa44);
            border: none;
            padding: 10px 26px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(0,200,80,0.4);
        }

        .refresh-glow:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 22px rgba(0,255,100,0.5);
            background: linear-gradient(95deg, #22ff77, #00dd55);
        }

        /* TABS STYLING - neon green theme */
        .tabs-container {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            background: rgba(0, 20, 12, 0.7);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 60px;
            width: fit-content;
            border: 1px solid rgba(0, 255, 100, 0.25);
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 32px;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            color: #88ffaa;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn i {
            font-size: 1.1rem;
            color: #5eff8e;
        }

        .tab-btn.active {
            background: linear-gradient(110deg, #00cc55, #22ff88);
            color: #001a0e;
            box-shadow: 0 6px 18px rgba(0,200,80,0.5);
        }

        .tab-btn.active i {
            color: #003d1a;
        }

        /* Metric cards - all text now visible with green */
        .metric-rainbow {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 22px;
            margin-bottom: 32px;
        }

        .glow-card {
            background: linear-gradient(145deg, rgba(10, 25, 18, 0.9), rgba(5, 18, 12, 0.85));
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.2rem 1.2rem;
            border: 1px solid rgba(0, 255, 120, 0.25);
            transition: all 0.2s;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
        }

        .glow-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 100, 0.7);
            background: linear-gradient(145deg, rgba(20, 45, 30, 0.9), rgba(8, 28, 18, 0.9));
        }

        .stat-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-title {
            color: #5effaa;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .stat-number {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #80ffb0, #30ff80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .glow-card span {
            color: #aaffcc;
            font-size: 12px;
        }

        /* register panel */
        .register-panel {
            background: linear-gradient(115deg, rgba(15, 35, 22, 0.8), rgba(8, 25, 15, 0.85));
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }

        .flex-form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6effaa;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid #2a6e4a;
            padding: 12px 16px;
            border-radius: 20px;
            color: #b0ffcc;
            font-weight: 500;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #33ff88;
            box-shadow: 0 0 0 3px rgba(51,255,136,0.3);
        }

        .btn-add {
            background: linear-gradient(105deg, #22cc66, #00aa44);
            border: none;
            padding: 0 2rem;
            height: 48px;
            border-radius: 32px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* API cards - all text neon green */
        .apis-masonry {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 26px;
        }

        .api-card-neon {
            background: linear-gradient(125deg, rgba(12, 35, 22, 0.92), rgba(6, 22, 14, 0.96));
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 120, 0.3);
            transition: 0.25s ease;
            overflow: hidden;
        }

        .api-card-neon:hover {
            border-color: #44ff88;
            box-shadow: 0 20px 30px -15px rgba(0,255,100,0.3);
            transform: translateY(-4px);
        }

        .card-header {
            padding: 1.2rem 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 255, 100, 0.2);
        }

        .api-badge {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .api-badge strong {
            color: #aaffcc !important;
            font-size: 1rem;
        }

        .api-badge span {
            color: #6effaa !important;
            opacity: 0.8;
        }

        .status-pulse {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .up-status { color: #44ff88 !important; background: rgba(68,255,136,0.2); }
        .down-status { color: #ff8866 !important; background: rgba(255,100,80,0.2); }

        .metrics-double {
            display: flex;
            padding: 1rem 1.5rem;
            gap: 20px;
            justify-content: space-between;
        }

        .metric-block {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1rem;
            padding: 12px;
            flex: 1;
            text-align: center;
        }

        .metric-block i {
            color: #5effaa !important;
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .metric-block span, .metric-block .metric-value-text {
            color: #ccffdd !important;
            font-weight: bold;
        }

        .chart-sm {
            height: 80px;
            margin: 0 1rem 1rem 1rem;
        }

        .action-bar {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(0, 255, 100, 0.15);
        }

        .action-bar span {
            color: #7affb0 !important;
            font-size: 0.75rem;
        }

        .btn-icon {
            background: rgba(0, 255, 100, 0.15);
            border: 1px solid rgba(0, 255, 100, 0.4);
            padding: 8px 16px;
            border-radius: 30px;
            color: #bbffcc;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-icon:hover {
            background: rgba(0, 255, 100, 0.35);
            color: white;
        }

        .toast-modern {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #0a2a1ae6;
            backdrop-filter: blur(12px);
            padding: 14px 24px;
            border-radius: 48px;
            color: #aaffcc;
            z-index: 2000;
            border-left: 5px solid #44ff88;
        }

        .tab-content {
            display: none;
        }
        .tab-content.active-tab {
            display: block;
        }

        /* analytics charts labels */
        canvas {
            filter: brightness(1.05);
        }

        h3 {
            color: #88ffbb !important;
        }

        #topPerformersList div {
            color: #b8ffd0 !important;
            margin: 8px 0;
        }

        #healthScoreCard span {
            color: #ddffcc;
        }

        #insightMessages {
            color: #aaffc0 !important;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="glass-header">
        <div class="title-glow">
            <h1><i class="fa-solid fa-chart-line"></i> Nexus API Health Observatory</h1>
            <p><i class="fa-regular fa-bell"></i> Neon Green Edition · Real‑time reliability · Intelligent metrics</p>
        </div>
        <div class="header-actions">
            <div class="pill-update"><i class="fa-regular fa-clock"></i> <span id="liveTimestamp">Updating...</span></div>
            <button class="refresh-glow" onclick="globalRefresh()"><i class="fa-solid fa-arrows-rotate"></i> Pulse Sync</button>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" data-tab="dashboardTab"><i class="fa-solid fa-chart-simple"></i> Live Dashboard</button>
        <button class="tab-btn" data-tab="analyticsTab"><i class="fa-solid fa-chart-pie"></i> Advanced Metrics</button>
        <button class="tab-btn" data-tab="insightsTab"><i class="fa-regular fa-lightbulb"></i> Reliability Insights</button>
    </div>

    <div id="dashboardTab" class="tab-content active-tab">
        <div class="metric-rainbow" id="statsPremiumGrid"></div>
        <div class="register-panel">
            <div class="flex-form">
                <div class="input-group"><label><i class="fa-regular fa-tag"></i> API Name</label><input type="text" id="apiName" placeholder="e.g., Stellar Gateway"></div>
                <div class="input-group"><label><i class="fa-solid fa-link"></i> Base URL</label><input type="url" id="apiUrl" placeholder="https://api.yourservice.com"></div>
                <button class="btn-add" onclick="registerNewAPI()"><i class="fa-solid fa-plus-circle"></i> Register Endpoint</button>
            </div>
        </div>
        <div class="apis-masonry" id="apisGridMain"></div>
    </div>

    <div id="analyticsTab" class="tab-content">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 30px;">
            <div class="glow-card" style="padding: 1rem;"><h3 style="color:#88ffaa;"><i class="fa-solid fa-waveform"></i> Response Time Distribution (24h avg)</h3><canvas id="globalLatencyChart" height="200"></canvas></div>
            <div class="glow-card" style="padding: 1rem;"><h3 style="color:#88ffaa;"><i class="fa-solid fa-chart-gantt"></i> Success / Failure Ratio</h3><canvas id="globalSuccessChart" height="200"></canvas></div>
        </div>
        <div class="glow-card" style="margin-bottom: 20px;"><h3 style="color:#88ffaa;"><i class="fa-solid fa-ranking-star"></i> Top Performers (Lowest Latency)</h3><div id="topPerformersList" style="padding: 15px;"></div></div>
    </div>

    <div id="insightsTab" class="tab-content">
        <div class="glow-card" style="margin-bottom: 24px;"><h3 style="color:#88ffaa;"><i class="fa-regular fa-calendar-check"></i> System Health Scorecard</h3><div id="healthScoreCard" style="font-size: 1.4rem; font-weight: bold; margin-top: 12px;"></div></div>
        <div class="glow-card"><h3 style="color:#88ffaa;"><i class="fa-solid fa-microchip"></i> Advanced Uptime Predictions (Rolling 7d)</h3><div id="insightMessages" style="padding: 10px;"></div></div>
    </div>
</div>

<script>
    const API_BASE = '';
    let currentApisData = [];
    let globalLatencyChartRef = null, globalPieChartRef = null;

    function showToast(msg, type='info') {
        let t = document.createElement('div');
        t.className = 'toast-modern';
        t.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.remove(), 500); }, 2800);
    }

    function formatSmartDate(timestamp) {
        if(!timestamp) return 'never';
        let d = new Date(timestamp);
        let seconds = Math.floor((new Date() - d)/1000);
        if(seconds<60) return `${seconds}s ago`;
        if(seconds<3600) return `${Math.floor(seconds/60)}m ago`;
        if(seconds<86400) return `${Math.floor(seconds/3600)}h ago`;
        return d.toLocaleDateString();
    }

    async function globalRefresh() {
        try {
            let summaryRes = await fetch(`${API_BASE}/metrics/summary`);
            let summary = await summaryRes.json();
            let apisRes = await fetch(`${API_BASE}/apis/`);
            let apis = await apisRes.json();
            currentApisData = apis;
            updatePremiumStats(summary, apis);
            updateApiGrid(apis);
            document.getElementById('liveTimestamp').innerHTML = new Date().toLocaleTimeString() + '  <i class="fa-regular fa-eye"></i>';
            updateAdvancedAnalytics(apis);
            updateInsightsTab(apis);
        } catch(e) {
            console.warn("DEMO MODE: generating fresh mock data with neon styling");
            const mockApis = generateMockApis();
            currentApisData = mockApis;
            updatePremiumStatsFromMock(mockApis);
            updateApiGrid(mockApis);
            updateAdvancedAnalytics(mockApis);
            updateInsightsTab(mockApis);
            document.getElementById('liveTimestamp').innerHTML = new Date().toLocaleTimeString() + ' (live demo)';
        }
    }

    function generateMockApis() {
        let names = ["Auth Service", "Payment Gateway", "User Profiles", "Analytics Engine", "Notification Hub", "Search API", "Event Stream", "Storage Gateway"];
        return names.map((n, idx) => ({
            id: idx+1, 
            name: n, 
            base_url: `https://api.${n.toLowerCase().replace(/ /g,'')}.io/v1`,
            last_check_status: Math.random() > 0.2,
            uptime_24h: 82 + Math.random() * 17,
            avg_response_24h_ms: 55 + Math.random() * 250,
            total_checks_24h: 100 + Math.random() * 180,
            last_check: new Date(Date.now() - Math.random()*120000).toISOString(),
            latency_history: [85, 110, 95, 130, 105, 98, 115, 102]
        }));
    }

    function updatePremiumStatsFromMock(apis) {
        let total = apis.length;
        let healthy = apis.filter(a=>a.last_check_status===true).length;
        let avgUptime = apis.reduce((a,b)=>a + (b.uptime_24h||0),0)/total || 0;
        let totalChecks = apis.reduce((a,b)=>a+(b.total_checks_24h||0),0);
        document.getElementById('statsPremiumGrid').innerHTML = `
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">🌐 TOTAL ENDPOINTS</span><i class="fa-solid fa-cloud" style="color:#5effaa"></i></div><div class="stat-number">${total}</div><span style="font-size:12px; color:#aaffcc;">active monitors</span></div>
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">💚 HEALTHY APIs</span><i class="fa-solid fa-heartbeat" style="color:#44ff88"></i></div><div class="stat-number">${healthy}</div><span style="color:#aaffcc;">${total?Math.round(healthy/total*100):0}% operational</span></div>
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">📈 AVG UPTIME (24h)</span><i class="fa-solid fa-chart-line" style="color:#88ff66"></i></div><div class="stat-number">${avgUptime.toFixed(1)}%</div><span style="color:#aaffcc;">rolling window</span></div>
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">⚡ TOTAL CHECKS</span><i class="fa-solid fa-microchip" style="color:#6effaa"></i></div><div class="stat-number">${totalChecks}</div><span style="color:#aaffcc;">last 24 hours</span></div>
        `;
    }

    function updatePremiumStats(summary, apis) {
        let total = apis?.length || 0;
        let healthy = apis?.filter(a=>a.last_check_status===true).length || 0;
        let avgUptime = apis?.length ? apis.reduce((a,b)=>a+(b.uptime_24h||0),0)/apis.length : 0;
        let totalChecks = apis?.reduce((a,b)=>a+(b.total_checks_24h||0),0) || 0;
        document.getElementById('statsPremiumGrid').innerHTML = `
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">🔮 REGISTERED</span><i class="fa-solid fa-database" style="color:#5effaa"></i></div><div class="stat-number">${total}</div><span>monitored services</span></div>
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">🟢 HEALTHY</span><i class="fa-solid fa-shield-heart" style="color:#44ff88"></i></div><div class="stat-number">${healthy}</div><span>status OK</span></div>
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">⏱️ AVG UPTIME</span><i class="fa-solid fa-gauge-high" style="color:#88ff66"></i></div><div class="stat-number">${avgUptime.toFixed(1)}%</div><span>last 24h</span></div>
            <div class="glow-card"><div class="stat-header-flex"><span class="stat-title">🔄 HEALTH CHECKS</span><i class="fa-solid fa-rotate-right" style="color:#6effaa"></i></div><div class="stat-number">${totalChecks}</div><span>total probes</span></div>
        `;
    }

    function updateApiGrid(apis) {
        let grid = document.getElementById('apisGridMain');
        if(!apis.length) { grid.innerHTML = `<div class="glow-card" style="grid-column:1/-1; text-align:center;">✨ No APIs yet. Register your first endpoint ✨</div>`; return; }
        grid.innerHTML = apis.map(api => {
            let statusClass = api.last_check_status === true ? 'up-status' : 'down-status';
            let statusIcon = api.last_check_status ? 'fa-circle-check' : 'fa-circle-exclamation';
            let statusText = api.last_check_status ? 'HEALTHY' : 'FAILED';
            let uptimeVal = api.uptime_24h?.toFixed(1) || '0';
            let latency = Math.round(api.avg_response_24h_ms || 0);
            let chartId = `spark-${api.id}`;
            setTimeout(() => renderMiniSparkline(chartId, api.latency_history || [100,120,95,130,110]), 100);
            return `<div class="api-card-neon"><div class="card-header"><div class="api-badge"><i class="fa-solid fa-waveform" style="color:#55ff99"></i><strong style="color:#ccffdd">${api.name}</strong><span style="font-size:11px; color:#aaffcc;">${api.base_url?.slice(0,35)}</span></div><div class="status-pulse ${statusClass}"><i class="fa-solid ${statusIcon}"></i> ${statusText}</div></div>
            <div class="metrics-double"><div class="metric-block"><i class="fa-regular fa-clock"></i><br><span style="font-size:1.6rem; font-weight:bold; color:#bbffcc;">${uptimeVal}%</span></div><div class="metric-block"><i class="fa-solid fa-gauge-max"></i><br><span style="font-size:1.6rem; font-weight:bold; color:#bbffcc;">${latency}<span style="font-size:0.8rem;">ms</span></span></div></div>
            <div class="chart-sm"><canvas id="${chartId}" width="300" height="60" style="width:100%; height:60px;"></canvas></div>
            <div class="action-bar"><span><i class="fa-regular fa-hourglass-half"></i> Last: ${formatSmartDate(api.last_check)}</span><div><button class="btn-icon" onclick="manualCheckAPI(${api.id})"><i class="fa-solid fa-play"></i> Check</button><button class="btn-icon" style="margin-left:8px; background:#aa4e3e30;" onclick="deleteAPIById(${api.id}, '${api.name}')"><i class="fa-solid fa-trash-can"></i></button></div></div></div>`;
        }).join('');
    }

    function renderMiniSparkline(canvasId, dataPoints) {
        let canvas = document.getElementById(canvasId);
        if(!canvas) return;
        let ctx = canvas.getContext('2d');
        if(window[`chart_${canvasId}`]) window[`chart_${canvasId}`].destroy();
        let chart = new Chart(ctx, {
            type: 'line', data: { labels: ['1','2','3','4','5','6'], datasets: [{ data: dataPoints.slice(0,6), borderColor: '#44ff88', borderWidth: 2, fill: true, backgroundColor: 'rgba(68,255,136,0.15)', pointRadius: 0, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
        window[`chart_${canvasId}`] = chart;
    }

    async function registerNewAPI() {
        let name = document.getElementById('apiName').value.trim();
        let url = document.getElementById('apiUrl').value.trim();
        if(!name || !url) { showToast('Name & URL required', 'error'); return; }
        try{
            let res = await fetch(`${API_BASE}/apis/`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, base_url:url}) });
            if(res.ok) { showToast(`✅ ${name} registered`); document.getElementById('apiName').value=''; document.getElementById('apiUrl').value=''; globalRefresh(); }
            else { showToast('API registration error', 'error'); }
        } catch(e){ showToast('➕ Added locally (demo)', 'info'); 
            let mockNew = { id: Date.now(), name, base_url:url, last_check_status:true, uptime_24h:98.5, avg_response_24h_ms:128, total_checks_24h:8, last_check: new Date().toISOString(), latency_history:[110,105,115] };
            currentApisData.push(mockNew); updateApiGrid(currentApisData); updatePremiumStatsFromMock(currentApisData); updateAdvancedAnalytics(currentApisData); updateInsightsTab(currentApisData); showToast('✨ API added in demo mode');}
    }

    window.manualCheckAPI = async function(apiId) {
        showToast(`⏳ Checking API ID ${apiId}...`);
        try { await fetch(`${API_BASE}/apis/${apiId}/check`, {method:'POST'}); setTimeout(globalRefresh, 1500); } catch(e){ showToast('🔄 Toggle health status', 'info'); let idx = currentApisData.findIndex(a=>a.id==apiId); if(idx>=0){ currentApisData[idx].last_check_status = !currentApisData[idx].last_check_status; currentApisData[idx].last_check = new Date().toISOString(); updateApiGrid(currentApisData); updatePremiumStatsFromMock(currentApisData); } }
    };
    window.deleteAPIById = function(id, name) { if(confirm(`Delete ${name}?`)){ currentApisData = currentApisData.filter(a=>a.id !== id); updateApiGrid(currentApisData); updatePremiumStatsFromMock(currentApisData); updateAdvancedAnalytics(currentApisData); updateInsightsTab(currentApisData); showToast(`🗑️ ${name} removed`); } };
    window.globalRefresh = globalRefresh;

    function updateAdvancedAnalytics(apis){
        let latencies = apis.map(a=>a.avg_response_24h_ms || 0);
        let healthyCount = apis.filter(a=>a.last_check_status===true).length;
        let unhealthy = apis.length - healthyCount;
        if(globalLatencyChartRef) globalLatencyChartRef.destroy();
        let ctx1 = document.getElementById('globalLatencyChart').getContext('2d');
        globalLatencyChartRef = new Chart(ctx1, { type: 'bar', data: { labels: apis.map(a=>a.name?.slice(0,12)), datasets: [{ label: 'Avg Response (ms)', data: latencies, backgroundColor: '#33ff88aa' }] }, options: { responsive: true, plugins: { legend: { labels: { color: '#aaffcc' } } } } });
        if(globalPieChartRef) globalPieChartRef.destroy();
        let ctx2 = document.getElementById('globalSuccessChart').getContext('2d');
        globalPieChartRef = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Healthy', 'Unhealthy'], datasets: [{ data: [healthyCount, unhealthy], backgroundColor: ['#44ff88', '#ff8866'] }] } });
        let sortedByLatency = [...apis].sort((a,b)=>(a.avg_response_24h_ms||999) - (b.avg_response_24h_ms||999)).slice(0,3);
        document.getElementById('topPerformersList').innerHTML = sortedByLatency.map(api=>`<div><i class="fa-solid fa-tachometer-alt" style="color:#66ff99"></i> <strong style="color:#ccffdd">${api.name}</strong> — ${Math.round(api.avg_response_24h_ms||0)} ms latency, uptime ${api.uptime_24h?.toFixed(1)}%</div>`).join('') || '<div>✨ No data yet</div>';
    }
    function updateInsightsTab(apis){
        let overallUptime = apis.length ? apis.reduce((a,b)=>a+(b.uptime_24h||0),0)/apis.length : 0;
        let healthScore = (overallUptime * 0.7) + ((apis.filter(a=>a.last_check_status===true).length/apis.length)*30 || 0);
        let scoreFinal = Math.min(100, Math.max(0, Math.round(healthScore)));
        document.getElementById('healthScoreCard').innerHTML = `<div style="background:linear-gradient(90deg,#33ff88, #88ffaa); width:${scoreFinal}%; height:20px; border-radius:20px;"></div><span style="margin-left:10px; color:#ccffdd;">${scoreFinal}/100 - ${scoreFinal>80?'Excellent Resilience':scoreFinal>50?'Moderate Stability':'Needs Attention'}</span>`;
        let insightHtml = `<i class="fa-regular fa-chart-line" style="color:#66ff99"></i> Predicted weekly availability: ${(overallUptime + (Math.random()*1.5-0.7)).toFixed(1)}% <br> ${apis.length>2? '📊 Recommendation: Add retry policies for lower uptime services': 'Register more APIs for deeper insights'}`;
        document.getElementById('insightMessages').innerHTML = insightHtml;
    }

    document.querySelectorAll('.tab-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            let target = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-content').forEach(tab=>tab.classList.remove('active-tab'));
            document.getElementById(target).classList.add('active-tab');
        });
    });
    globalRefresh();
    setInterval(globalRefresh, 28000);
</script>
</body>
</html>
