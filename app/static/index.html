<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Health Monitor Dashboard</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js for beautiful charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Main container */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header-left h1 {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-left h1 i {
            color: #667eea;
            font-size: 32px;
        }

        .header-left p {
            color: #718096;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .refresh-btn i {
            font-size: 16px;
        }

        .last-updated {
            background: #f7fafc;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .last-updated i {
            color: #48bb78;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-header h3 {
            color: #718096;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #a0aec0;
            font-size: 13px;
        }

        /* Add API Form */
        .add-api-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .add-api-section h2 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-api-section h2 i {
            color: #48bb78;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f7fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            height: 45px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }

        /* API Cards Grid */
        .apis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .api-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .api-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .api-header {
            padding: 20px;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .api-info h3 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .api-info h3 i {
            color: #667eea;
            font-size: 20px;
        }

        .api-url {
            font-size: 12px;
            color: #718096;
            background: white;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge.up {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-badge.down {
            background: #fed7d7;
            color: #742a2a;
        }

        .status-badge.unknown {
            background: #e2e8f0;
            color: #4a5568;
        }

        .api-body {
            padding: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric-item {
            text-align: center;
            padding: 15px;
            background: #f7fafc;
            border-radius: 12px;
        }

        .metric-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
        }

        .metric-unit {
            font-size: 12px;
            color: #a0aec0;
            margin-left: 2px;
        }

        .api-footer {
            padding: 15px 20px;
            background: #f7fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .api-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }

        .check-btn {
            background: #ebf8ff;
            color: #2b6cb0;
        }

        .check-btn:hover {
            background: #bee3f8;
        }

        .delete-btn {
            background: #fff5f5;
            color: #c53030;
        }

        .delete-btn:hover {
            background: #fed7d7;
        }

        .last-check {
            font-size: 12px;
            color: #718096;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Chart container */
        .chart-container {
            margin-top: 15px;
            height: 100px;
            position: relative;
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.success {
            border-left: 4px solid #48bb78;
        }

        .toast.error {
            border-left: 4px solid #f56565;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>
                    <i class="fas fa-heartbeat"></i>
                    API Health Monitor
                </h1>
                <p>Real-time monitoring dashboard for your APIs</p>
            </div>
            <div class="header-right">
                <div class="last-updated">
                    <i class="fas fa-clock"></i>
                    <span id="lastUpdated">Loading...</span>
                </div>
                <button class="refresh-btn" onclick="fetchAllData()">
                    <i class="fas fa-sync-alt"></i>
                    Refresh Data
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <!-- Will be populated by JavaScript -->
        </div>

        <!-- Add API Form -->
        <div class="add-api-section">
            <h2>
                <i class="fas fa-plus-circle"></i>
                Register New API
            </h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>API Name</label>
                    <input type="text" id="apiName" placeholder="e.g., Google API" />
                </div>
                <div class="form-group">
                    <label>Base URL</label>
                    <input type="url" id="apiUrl" placeholder="https://api.example.com" />
                </div>
                <button class="add-btn" onclick="registerAPI()">
                    <i class="fas fa-plus"></i>
                    Register
                </button>
            </div>
        </div>

        <!-- APIs Grid -->
        <div class="apis-grid" id="apisGrid">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>

    <script>
        const API_BASE = '';  // Empty for same-origin, or set to your FastAPI URL
        
        // Global charts store
        const charts = {};

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}" 
                   style="color: ${type === 'success' ? '#48bb78' : '#f56565'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Format date
        function formatDate(timestamp) {
            if (!timestamp) return 'Never';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return `${diff} seconds ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)} minutes ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
            return date.toLocaleDateString();
        }

        // Fetch all data from APIs
        async function fetchAllData() {
            try {
                // Fetch summary stats
                const summaryRes = await fetch(`${API_BASE}/metrics/summary`);
                const summaryData = await summaryRes.json();
                
                // Fetch all APIs
                const apisRes = await fetch(`${API_BASE}/apis/`);
                const apis = await apisRes.json();
                
                // Update UI
                updateStats(summaryData);
                updateAPIsGrid(apis);
                document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
                
            } catch (error) {
                console.error('Error fetching data:', error);
                showToast('Failed to fetch data from server', 'error');
            }
        }

        // Update stats cards
        function updateStats(summary) {
            const totalAPIs = summary.total_apis || 0;
            const totalChecks = summary.apis?.reduce((acc, api) => acc + (api.total_checks_24h || 0), 0) || 0;
            const avgUptime = summary.apis?.length 
                ? (summary.apis.reduce((acc, api) => acc + (api.uptime_24h || 0), 0) / summary.apis.length).toFixed(1)
                : 0;
            const healthyAPIs = summary.apis?.filter(api => api.last_check_status === true).length || 0;
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-header">
                        <h3>Total APIs</h3>
                        <div class="stat-icon" style="background: #ebf8ff; color: #2b6cb0">
                            <i class="fas fa-server"></i>
                        </div>
                    </div>
                    <div class="stat-value">${totalAPIs}</div>
                    <div class="stat-label">registered endpoints</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <h3>Healthy APIs</h3>
                        <div class="stat-icon" style="background: #c6f6d5; color: #22543d">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                    <div class="stat-value">${healthyAPIs}</div>
                    <div class="stat-label">${totalAPIs ? Math.round(healthyAPIs/totalAPIs*100) : 0}% operational</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <h3>Avg Uptime (24h)</h3>
                        <div class="stat-icon" style="background: #feebc8; color: #c05621">
                            <i class="fas fa-chart-line"></i>
                        </div>
                    </div>
                    <div class="stat-value">${avgUptime}%</div>
                    <div class="stat-label">last 24 hours</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <h3>Total Checks</h3>
                        <div class="stat-icon" style="background: #e9d8fd; color: #553c9a">
                            <i class="fas fa-tasks"></i>
                        </div>
                    </div>
                    <div class="stat-value">${totalChecks}</div>
                    <div class="stat-label">in last 24h</div>
                </div>
            `;
        }

        // Create mini chart for API
        function createMiniChart(apiId, data) {
            const canvasId = `chart-${apiId}`;
            
            // Destroy existing chart if any
            if (charts[apiId]) {
                charts[apiId].destroy();
            }
            
            // Prepare data (simplified for demo - in production, fetch real history)
            const mockData = {
                labels: ['-5m', '-4m', '-3m', '-2m', '-1m', 'Now'],
                values: data ? [200, 180, 220, 190, 210, 195] : [0, 0, 0, 0, 0, 0]
            };
            
            setTimeout(() => {
                const ctx = document.getElementById(canvasId)?.getContext('2d');
                if (!ctx) return;
                
                charts[apiId] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: mockData.labels,
                        datasets: [{
                            label: 'Response Time (ms)',
                            data: mockData.values,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 2,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false }
                        },
                        scales: {
                            x: { display: false },
                            y: { display: false }
                        },
                        elements: {
                            line: { borderWidth: 2 }
                        }
                    }
                });
            }, 100);
        }

        // Update APIs grid
        function updateAPIsGrid(apis) {
            const grid = document.getElementById('apisGrid');
            
            if (!apis || apis.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px; background: white; border-radius: 20px;">
                        <i class="fas fa-database" style="font-size: 48px; color: #cbd5e0; margin-bottom: 15px;"></i>
                        <h3 style="color: #718096; margin-bottom: 10px;">No APIs Registered</h3>
                        <p style="color: #a0aec0;">Register your first API using the form above</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = apis.map(api => {
                const status = api.last_check_status === true ? 'up' : (api.last_check_status === false ? 'down' : 'unknown');
                const statusIcon = status === 'up' ? 'fa-check-circle' : (status === 'down' ? 'fa-exclamation-circle' : 'fa-question-circle');
                const apiId = api.id;
                
                // Create chart canvas
                setTimeout(() => createMiniChart(apiId, api), 100);
                
                return `
                    <div class="api-card" id="api-${apiId}">
                        <div class="api-header">
                            <div class="api-info">
                                <h3>
                                    <i class="fas fa-bolt"></i>
                                    ${api.name || 'Unnamed API'}
                                </h3>
                                <span class="api-url" title="${api.base_url}">
                                    ${api.base_url || 'No URL'}
                                </span>
                            </div>
                            <div class="status-badge ${status}">
                                <i class="fas ${statusIcon}"></i>
                                <span>${status.toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="api-body">
                            <div class="metrics-grid">
                                <div class="metric-item">
                                    <div class="metric-label">Uptime (24h)</div>
                                    <div class="metric-value">
                                        ${api.uptime_24h?.toFixed(1) || 0}<span class="metric-unit">%</span>
                                    </div>
                                </div>
                                <div class="metric-item">
                                    <div class="metric-label">Avg Response</div>
                                    <div class="metric-value">
                                        ${Math.round(api.avg_response_24h_ms) || 0}<span class="metric-unit">ms</span>
                                    </div>
                                </div>
                            </div>
                            <div class="chart-container">
                                <canvas id="chart-${apiId}"></canvas>
                            </div>
                        </div>
                        <div class="api-footer">
                            <div class="last-check">
                                <i class="fas fa-history"></i>
                                <span>Last: ${formatDate(api.last_check)}</span>
                            </div>
                            <div class="api-actions">
                                <button class="action-btn check-btn" onclick="manualCheck(${apiId})">
                                    <i class="fas fa-play"></i>
                                    Check
                                </button>
                                <button class="action-btn delete-btn" onclick="deleteAPI(${apiId}, '${api.name}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Register new API
        async function registerAPI() {
            const name = document.getElementById('apiName').value.trim();
            const url = document.getElementById('apiUrl').value.trim();
            
            if (!name || !url) {
                showToast('Please fill in both fields', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/apis/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, base_url: url })
                });
                
                if (response.ok) {
                    document.getElementById('apiName').value = '';
                    document.getElementById('apiUrl').value = '';
                    showToast('API registered successfully!');
                    await fetchAllData();
                } else {
                    const error = await response.json();
                    showToast(error.detail || 'Failed to register API', 'error');
                }
            } catch (error) {
                showToast('Network error', 'error');
            }
        }

        // Manual health check
        async function manualCheck(apiId) {
            try {
                const response = await fetch(`${API_BASE}/apis/${apiId}/check`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    showToast('Health check initiated');
                    setTimeout(fetchAllData, 2000);  // Wait 2 seconds for check to complete
                } else {
                    showToast('Failed to start health check', 'error');
                }
            } catch (error) {
                showToast('Network error', 'error');
            }
        }

        // Delete API
        async function deleteAPI(apiId, apiName) {
            if (!confirm(`Are you sure you want to delete "${apiName}"?`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/apis/${apiId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showToast('API deleted successfully');
                    // Remove card with animation
                    const card = document.getElementById(`api-${apiId}`);
                    if (card) {
                        card.style.transition = 'all 0.3s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.8)';
                        setTimeout(() => {
                            card.remove();
                            fetchAllData();  // Refresh stats
                        }, 300);
                    }
                } else {
                    showToast('Failed to delete API', 'error');
                }
            } catch (error) {
                showToast('Network error', 'error');
            }
        }

        // Initial load
